<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="대여금장부">
<meta name="theme-color" content="#ffffff">
<title>대여금장부</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f7f7;--bg2:#ffffff;--bg3:#f0f0f0;--border:#e0e0e0;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-light:#dbeafe;
  --red:#dc2626;--red-bg:#fef2f2;
  --green:#16a34a;--green-bg:#f0fdf4;
  --accent:#2563eb;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0}

/* 헤더 */
.header{background:#fff;padding:env(safe-area-inset-top,12px) 16px 0;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px}
.app-title{font-size:20px;font-weight:700;color:var(--text)}
.header-date{font-size:12px;color:var(--text2)}

/* 탭 */
.tabs{display:flex;gap:0}
.tab{flex:1;padding:10px 0;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--text3);font-family:'Noto Sans KR',sans-serif;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* 요약 카드 */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border)}
.stat{background:var(--bg);border-radius:10px;padding:10px 12px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:16px;font-weight:700}
.stat-val.blue{color:var(--blue)}.stat-val.red{color:var(--red)}.stat-val.green{color:var(--green)}

/* 리스트 */
.list-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.list{padding:8px 16px;display:flex;flex-direction:column;gap:6px}

.item{background:#fff;border-radius:10px;padding:11px 14px;border:1px solid var(--border)}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item-desc{font-size:13px;color:var(--text);font-weight:500;flex:1}
.item-amounts{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.item-in{font-size:12px;font-weight:700;color:var(--green)}
.item-out{font-size:12px;font-weight:700;color:var(--red)}
.item-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.item-date{font-size:11px;color:var(--text3)}
.item-balance{font-size:12px;font-weight:700;color:var(--blue)}
.item-memo{font-size:11px;color:var(--text2);margin-top:3px;font-style:italic}
.item-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
.item-del:active{color:var(--red)}
.empty{text-align:center;padding:3rem 0;color:var(--text3);font-size:14px}

/* 입력 */
.input-area{background:#fff;border-top:1px solid var(--border);padding:10px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));flex-shrink:0;overflow:hidden;width:100%;box-sizing:border-box}
.inp-row{display:flex;gap:6px;margin-bottom:6px;width:100%}

.inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--text3)}
.inp-sm{width:80px;flex:none}
.inp-date{width:85px;flex:none}

.type-btns{display:flex;gap:6px;margin-bottom:6px}
.type-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;font-weight:500;font-family:'Noto Sans KR',sans-serif;color:var(--text2);transition:all 0.15s}
.type-btn.active-in{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.type-btn.active-out{background:var(--red-bg);color:var(--red);border-color:var(--red)}

.btn-add{padding:9px 12px;background:var(--blue);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;color:#fff;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;flex-shrink:0}
.btn-add:active{opacity:0.85}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 양성국 이자계산 */
.interest-card{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--border);margin:8px 16px}
.interest-title{font-size:12px;color:var(--text2);margin-bottom:6px}
.interest-vals{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.interest-val{background:var(--bg);border-radius:8px;padding:8px 10px}
.interest-val-label{font-size:10px;color:var(--text3)}
.interest-val-num{font-size:14px;font-weight:700;color:var(--blue)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">대여금 장부</div>
      <div class="header-date" id="todayDate"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('sangrok')">상록</button>
      <button class="tab" onclick="setTab('yangsung')">양성국</button>
    </div>
  </div>

  <div class="summary">
    <div class="stat">
      <div class="stat-label">총 빌려준 금액</div>
      <div class="stat-val red" id="totalOut">-</div>
    </div>
    <div class="stat">
      <div class="stat-label">현재 잔액</div>
      <div class="stat-val blue" id="currentBalance">-</div>
    </div>
  </div>

  <div class="list-wrap">
    <div class="list" id="listEl"></div>
  </div>

  <div class="input-area">
    <div class="inp-row">
      <input class="inp" type="text" id="inpDesc" placeholder="내용 입력">
      <input class="inp inp-date" type="text" id="inpDate" placeholder="날짜">
    </div>
    <div class="type-btns">
      <button class="type-btn active-in" id="btnIn" onclick="setType('in')">↑ 입금 (받음)</button>
      <button class="type-btn" id="btnOut" onclick="setType('out')">↓ 출금 (빌려줌)</button>
    </div>
    <div class="inp-row">
      <input class="inp" type="text" inputmode="numeric" id="inpAmt" placeholder="금액" oninput="fmtAmt(this)">
      <input class="inp" type="text" id="inpMemo" placeholder="메모">
    </div>
    <button class="btn-add" style="width:100%;margin-bottom:2px" onclick="addItem()">추가</button>
  </div>
</div>
<div class="toast" id="toast"></div>

if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
const _db = firebase.firestore();
const _DOC = _db.collection('daeyeo').doc('data');

window.saveToCloud = async function(d) {
  try {
    await _DOC.set({
      sangrok: JSON.stringify(d.sangrok),
      yangsung: JSON.stringify(d.yangsung),
      updatedAt: new Date().toISOString()
    });
  } catch(e) { console.error('저장실패:', e); }
};

window.loadFromCloud = async function() {
  try {
    const snap = await _DOC.get();
    if (snap.exists) {
      const d = snap.data();
      return {
        sangrok: JSON.parse(d.sangrok || '[]'),
        yangsung: JSON.parse(d.yangsung || '[]')
      };
    }
  } catch(e) { console.error('로드실패:', e); }
  return null;
};

window.startSync = function(cb) {
  _DOC.onSnapshot((snap) => {
    if (snap.exists) {
      const d = snap.data();
      cb({
        sangrok: JSON.parse(d.sangrok || '[]'),
        yangsung: JSON.parse(d.yangsung || '[]')
      });
    }
  });
};
</script>

let data = { sangrok: [], yangsung: [] };
let inputTypeState = 'out';

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('ko-KR');

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (p.sangrok && p.sangrok.length > 0) data.sangrok = p.sangrok;
      else data.sangrok = SANGROK_PRESET;
      if (p.yangsung && p.yangsung.length > 0) data.yangsung = p.yangsung;
      else data.yangsung = YANGSUNG_PRESET;
    } else {
      data.sangrok = SANGROK_PRESET;
      data.yangsung = YANGSUNG_PRESET;
    }
  } catch(e) {
    data.sangrok = SANGROK_PRESET;
    data.yangsung = YANGSUNG_PRESET;
  }
  setTodayDate();
  render();

  setTimeout(async () => {
    try {
      const cd = await window.loadFromCloud();
      if (cd && (cd.sangrok.length > 0 || cd.yangsung.length > 0)) {
        data = cd;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        render();
        toast('☁️ 동기화 완료');
      }
    } catch(e) {}
    window.startSync((cd) => {
      data = cd;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
      toast('☁️ 업데이트됨');
    });
  }, 1000);
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  if (window.saveToCloud) window.saveToCloud(data);
}

function setTodayDate() {
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  document.getElementById('inpDate').value = d.getFullYear()+'-'+mm+'-'+dd;
}

function setTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['sangrok','yangsung'][i] === t);
  });
  render();
}

function setType(t) {
  inputTypeState = t;
  document.getElementById('btnIn').className = 'type-btn' + (t==='in'?' active-in':'');
  document.getElementById('btnOut').className = 'type-btn' + (t==='out'?' active-out':'');
}

function fmt(n) { return Number(n).toLocaleString('ko-KR')+'원'; }
function fmtAmt(el) {
  let raw = el.value.replace(/,/g,'').replace(/[^0-9]/g,'');
  if (raw) el.value = Number(raw).toLocaleString('ko-KR');
  else el.value = '';
}

function render() {
  const items = [...data[tab]].sort((a,b) => {
    if (a.date < b.date) return -1;
    if (a.date > b.date) return 1;
    return (a.id||0) - (b.id||0);
  });

  // 통계
  const totalOut = data[tab].reduce((s,it) => s + Number(it.expense), 0);
  const lastBalance = items.length > 0 ? Number(items[items.length-1].balance) : 0;
  document.getElementById('totalOut').textContent = fmt(totalOut);
  document.getElementById('currentBalance').textContent = fmt(lastBalance);

  const el = document.getElementById('listEl');
  if (!items.length) { el.innerHTML = '<div class="empty">내역이 없습니다</div>'; return; }

  el.innerHTML = items.map(it => {
    const ri = data[tab].findIndex(x => x.id === it.id);
    return `<div class="item">
      <div class="item-top">
        <div class="item-desc">${it.desc || '(내용없음)'}</div>
        <div class="item-amounts">
          ${it.income > 0 ? `<span class="item-in">+${fmt(it.income)}</span>` : ''}
          ${it.expense > 0 ? `<span class="item-out">-${fmt(it.expense)}</span>` : ''}
        </div>
      </div>
      ${it.memo ? `<div class="item-memo">${it.memo}</div>` : ''}
      <div class="item-bottom">
        <span class="item-date">${it.date || ''}</span>
        <span class="item-balance">잔액 ${fmt(it.balance)}</span>
        <button class="item-del" onclick="del(${ri})">×</button>
      </div>
    </div>`;
  }).join('');
}

function addItem() {
  const desc = document.getElementById('inpDesc').value.trim();
  const date = document.getElementById('inpDate').value.trim();
  const amtRaw = document.getElementById('inpAmt').value.replace(/,/g,'').trim();
  const memo = document.getElementById('inpMemo').value.trim();
  if (!amtRaw) { toast('금액을 입력해주세요'); return; }
  const amt = Number(amtRaw);

  const items = [...data[tab]].sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  const lastBalance = items.length > 0 ? Number(items[items.length-1].balance) : 0;
  const newBalance = inputTypeState === 'in' ? lastBalance - amt : lastBalance + amt;

  const newItem = {
    date, desc,
    income: inputTypeState === 'in' ? amt : 0,
    expense: inputTypeState === 'out' ? amt : 0,
    balance: newBalance,
    memo,
    id: Date.now()
  };
  data[tab].push(newItem);
  save(); render();
  document.getElementById('inpDesc').value = '';
  document.getElementById('inpAmt').value = '';
  document.getElementById('inpMemo').value = '';
  toast('추가됐어요!');
}

function del(i) {
  const pw = prompt('삭제 비밀번호:');
  if (pw === null) return;
  if (pw !== '5143') { toast('비밀번호가 틀렸어요'); return; }
  if (!confirm('정말 삭제할까요?')) return;
  data[tab].splice(i, 1);
  save(); render();
  toast('삭제됐어요');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

document.getElementById('inpMemo').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// 기본값 출금으로
setType('out');
load();
</script>
</body>
</html>
